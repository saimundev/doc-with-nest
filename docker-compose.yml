services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_management_app
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - database
    volumes:
      - .:/app
      - /app/node_modules
  database:
    image: postgres:16-alpine
    container_name: project_management_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: myapp
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
